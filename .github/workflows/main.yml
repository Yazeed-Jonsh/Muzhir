name: Build Flutter APK

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Restore Firebase config files
        run: |
          if [ -z "${{ secrets.FIREBASE_OPTIONS_DART_B64 }}" ]; then
            echo "Missing GitHub secret: FIREBASE_OPTIONS_DART_B64"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" ]; then
            echo "Missing GitHub secret: GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi
          echo "${{ secrets.FIREBASE_OPTIONS_DART_B64 }}" | base64 --decode > mobile_app/lib/firebase_options.dart
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > mobile_app/android/app/google-services.json

      - name: Install dependencies
        working-directory: mobile_app
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile_app
        run: flutter build apk --release --no-shrink

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk

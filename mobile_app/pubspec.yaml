name: muzhir
description: "Muzhir - AI-powered plant disease detection for Saudi Arabia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: any
  google_fonts: ^6.2.1
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  image_picker: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  dotted_border: ^3.1.0
  flutter_riverpod: ^2.5.1
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.4
  http: ^1.5.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1
  # ── On-Device Inference ────────────────────────────────────────────────
  ultralytics_yolo: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/logos/
    # ── ML Models ──────────────────────────────────────────────────────────
    # Android: TFLite weights (fp16 for GPU/NNAPI delegate, int8 for CPU fallback)
    - assets/models/muzhir_fp16.tflite
    - assets/models/muzhir_int8.tflite
    # iOS: CoreML .mlpackage bundle (directory structure must be preserved)
    # NOTE: also drag-drop into Xcode ios/Runner.xcworkspace → Runner target for ANE
    - assets/models/muzhir_ios_coreml.mlpackage/Manifest.json
    - assets/models/muzhir_ios_coreml.mlpackage/Data/com.apple.CoreML/model.mlmodel
    - assets/models/muzhir_ios_coreml.mlpackage/Data/com.apple.CoreML/weights/weight.bin
    # Label map shared by backend and on-device inference
    - assets/models/class_map.json


name: muzhir
description: "Muzhir - AI-powered plant disease detection for Saudi Arabia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  image_picker: ^1.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  dotted_border: ^3.1.0
  flutter_riverpod: ^3.3.1
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.4
  http: ^1.5.0
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logos/
  
